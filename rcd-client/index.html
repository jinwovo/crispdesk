<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content Security Policy: this is a desktop app loaded from a local file.
      We allow inline styles for the tiny control bar, and connect-src '*' because
      the user types an arbitrary ws:// signaling URL and WebRTC needs to reach
      STUN/TURN. Tighten in a later milestone once the URL set is known.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src *; media-src blob: mediastream:;"
    />
    <title>rcd — client</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        font-family: system-ui, sans-serif;
        color: #eee;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      /* Compact control bar pinned to the top. */
      #bar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: #1b1b1f;
        border-bottom: 1px solid #2a2a30;
        font-size: 13px;
      }
      #bar label {
        opacity: 0.8;
      }
      #bar input {
        background: #101014;
        color: #eee;
        border: 1px solid #33333a;
        border-radius: 4px;
        padding: 4px 6px;
        font-size: 13px;
      }
      #signalUrl {
        width: 220px;
      }
      #pairingCode {
        width: 90px;
      }
      #connectBtn {
        background: #2d6cdf;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 5px 14px;
        cursor: pointer;
        font-size: 13px;
      }
      #connectBtn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        margin-left: auto;
        opacity: 0.85;
        white-space: nowrap;
      }
      /* Video fills the remaining space; contain keeps aspect ratio (letterboxing). */
      #stage {
        flex: 1 1 auto;
        position: relative;
        background: #000;
        min-height: 0;
      }
      #remote {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <label for="signalUrl">Signaling</label>
      <input id="signalUrl" type="text" value="ws://127.0.0.1:8080/ws" spellcheck="false" />
      <label for="pairingCode">Code</label>
      <input id="pairingCode" type="text" value="123456" spellcheck="false" />
      <button id="connectBtn" type="button">Connect</button>
      <!-- Uncheck for view-only mode (essential when mirror-testing on the same PC:
           injected input would otherwise bounce the real cursor out of the video). -->
      <label title="입력 전달 (끄면 보기 전용)">
        <input id="forwardInput" type="checkbox" checked /> input
      </label>
      <span id="status">idle</span>
    </div>
    <div id="stage">
      <!-- autoplay + muted + playsinline so the incoming track starts without a gesture. -->
      <video id="remote" autoplay muted playsinline></video>
    </div>

    <!-- Renderer is a real ES module so it can use top-level imports if needed later. -->
    <script type="module" src="./dist/renderer/renderer.js"></script>
  </body>
</html>
