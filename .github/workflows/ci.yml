name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---- Signaling server (Node/TS): build + unit tests + dependency audit ----
  signal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rcd-signal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm audit --omit=dev || true   # report, don't fail the build (yet)

  # ---- Electron client (TS): type-check / compile (no Electron run in CI) ----
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rcd-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - run: npm audit --omit=dev || true

  # ---- Rust host: build + unit tests on a native ARM64 Windows runner ----
  # Uses the GitHub-hosted Windows-on-ARM runner so the aarch64-pc-windows-msvc
  # toolchain (pinned in rust-toolchain.toml) and the GStreamer ARM64 build match
  # the dev machine. NOTE: first run may need the GStreamer MSI URL / install path
  # adjusted (the MSI installs under C:\gstreamer\1.0\msvc_arm64).
  host:
    runs-on: windows-11-arm
    defaults:
      run:
        working-directory: rcd-host
    steps:
      - uses: actions/checkout@v4
      - name: Install GStreamer (ARM64 MSVC, runtime + devel)
        shell: pwsh
        run: |
          $ver = "1.28.3"
          $base = "https://gstreamer.freedesktop.org/data/pkg/windows/$ver/msvc"
          curl.exe -L -o gst-runtime.msi "$base/gstreamer-1.0-msvc-arm64-$ver.msi"
          curl.exe -L -o gst-devel.msi   "$base/gstreamer-1.0-devel-msvc-arm64-$ver.msi"
          Start-Process msiexec -ArgumentList '/i','gst-runtime.msi','/quiet','/norestart' -Wait
          Start-Process msiexec -ArgumentList '/i','gst-devel.msi','/quiet','/norestart' -Wait
          "C:\gstreamer\1.0\msvc_arm64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "PKG_CONFIG_PATH=C:\gstreamer\1.0\msvc_arm64\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Toolchain info
        run: rustup show
      - run: cargo build --locked
      - run: cargo test --locked
