name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---- Signaling server (Node/TS): build + unit tests + dependency audit ----
  signal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rcd-signal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm audit --omit=dev || true   # report, don't fail the build (yet)

  # ---- Electron client (TS): type-check / compile (no Electron run in CI) ----
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rcd-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - run: npm audit --omit=dev || true

  # ---- Rust host: build + unit tests on a native ARM64 Windows runner ----
  # Uses the GitHub-hosted Windows-on-ARM runner so the aarch64-pc-windows-msvc
  # toolchain (pinned in rust-toolchain.toml) and the GStreamer ARM64 build match
  # the dev machine. NOTE: first run may need the GStreamer MSI URL / install path
  # adjusted (the MSI installs under C:\gstreamer\1.0\msvc_arm64).
  host:
    runs-on: windows-11-arm
    # Non-blocking for now: the GStreamer-on-ARM64 CI install is still being nailed
    # down (the dev machine uses the unified MSVC ARM64 installer, and the silent
    # install path on the runner needs validating). The host is verified locally via
    # `cargo test` (see README) until this is green. The Node jobs above gate CI.
    continue-on-error: true
    defaults:
      run:
        working-directory: rcd-host
    steps:
      - uses: actions/checkout@v4
      - name: Install GStreamer (ARM64 MSVC, runtime + devel)
        shell: pwsh
        run: |
          $ver = "1.28.3"
          $base = "https://gstreamer.freedesktop.org/data/pkg/windows/$ver/msvc"
          # Try the per-arch MSIs first, then fall back to the unified ARM64 installer.
          $ok = $false
          foreach ($pkg in @("gstreamer-1.0-msvc-arm64-$ver.msi", "gstreamer-1.0-devel-msvc-arm64-$ver.msi")) {
            curl.exe -fL -o $pkg "$base/$pkg"
            if ($LASTEXITCODE -eq 0) {
              $p = Start-Process msiexec -ArgumentList '/i',$pkg,'/quiet','/norestart' -Wait -PassThru
              Write-Host "msiexec $pkg exit=$($p.ExitCode)"
              if ($p.ExitCode -eq 0) { $ok = $true }
            } else {
              Write-Host "download failed: $pkg"
            }
          }
          if (-not $ok) {
            curl.exe -fL -o gst.exe "$base/gstreamer-1.0-msvc-arm64-$ver.exe"
            if ($LASTEXITCODE -eq 0) { Start-Process .\gst.exe -ArgumentList '/S' -Wait }
          }
          # Locate the install and export PATH / PKG_CONFIG_PATH (whichever exists).
          $root = @("C:\gstreamer\1.0\msvc_arm64", "C:\Program Files\gstreamer\1.0\msvc_arm64") |
            Where-Object { Test-Path "$_\bin" } | Select-Object -First 1
          if (-not $root) { Write-Error "GStreamer not found after install"; exit 1 }
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "PKG_CONFIG_PATH=$root\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
          & "$root\bin\pkg-config.exe" --modversion gstreamer-1.0
      - name: Toolchain info
        run: rustup show
      - run: cargo build --locked
      - run: cargo test --locked
